services:
  postgres:
    image: postgres:16-alpine
    container_name: biko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biko
    ports:
      - "5433:5432"
    volumes:
      - biko_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  biko_pgdata:
